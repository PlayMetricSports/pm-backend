name: Deploy PM Backend PROD Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: PM-Production-Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"


      # - name: Install dependencies
      #   run: npm install

      - name: Creating ENV
        run: cp ../../../../env/pm-backend-production.txt .env 
      
      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Stop existing deployment
        run: |
          docker compose down || true


      - name: Build and deploy
        run: |
          docker compose up -d --build

      - name: Wait for application startup
        run: sleep 20
      
      - name: Health Check
        run: |
          curl --fail --silent https://playmetric.in/api/health
      
      - name: Show container status
        if: always()
        run: |
          docker compose ps

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs --tail=200

      - name: Cleanup old images
        if: always()
        run: |
          docker image prune -af



